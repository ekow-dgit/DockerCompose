services:
  my-app:
    build: .
    ports:
      - "3000:3000"
    restart: always
    environment:
      - MONGO_DB_USERNAME=${MONGO_ADMIN_USER}
      - MONGO_DB_PASSWORD=${MONGO_ADMIN_PASS}
      - MONGO_URL=mongodb://${MONGO_ADMIN_USER}:${MONGO_ADMIN_PASS}@mongodb:27017/mydb?authSource=admin
      - REDIS_URL=redis://cache:6379
    depends_on:
      - "mongodb"
      - "cache"

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMIN_PASS}

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ADMIN_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ADMIN_PASS}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ADMIN_USER}:${MONGO_ADMIN_PASS}@mongodb:27017/?authSource=admin
    depends_on:
      - "mongodb"

  cache:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"

  worker:
    build: .
    command: ["node", "worker.js"]
    restart: always
    environment:
      - MONGO_DB_USERNAME=${MONGO_ADMIN_USER}
      - MONGO_DB_PASSWORD=${MONGO_ADMIN_PASS}
    depends_on:
      - "mongodb"
