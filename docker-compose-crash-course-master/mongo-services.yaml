version: 2.31.0
services:
  my-app:
    build: .
    ports:
      - "3000:3000"
    restart: always
    environment:
      - MONGO_DB_USERNAME=admin
      - MONGO_DB_PASSWORD=secret
      - MONGO_URL=mongodb://admin:secret@mongodb:27017/mydb?authSource=admin
    depends_on:
      - "mongodb"

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret
      - ME_CONFIG_MONGODB_URL=mongodb://admin:secret@mongodb:27017/?authSource=admin
    depends_on:
      - "mongodb"
