<html lang="en">
<style>
    .container {
        margin: 40px auto;
        width: 80%;
    }
 
    hr {
        width: 400px;
        margin-left: 0;
    }
    h3 {
        display: inline-block;
    }
    #static {
        color: red;
    }
    #dynamic {
        color: green;
    }
</style>
<script>
    async function updateData() {
        try {
            const response = await fetch('/fetch-data');
            const data = await response.json();
            
            if (data.value !== undefined) {
                document.getElementById('dynamic').innerHTML = `
                    <div style="margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                        <p><strong>Value:</strong> ${data.value}</p>
                        <p><strong>Status:</strong> <span style="color: ${data.status === 'Healthy' ? 'green' : 'orange'}">${data.status}</span></p>
                        <p><strong>Last Worker Update:</strong> ${new Date(data.lastUpdated).toLocaleTimeString()}</p>
                        <p><small style="color: gray">Refreshed at: ${new Date().toLocaleTimeString()}</small></p>
                    </div>
                `;
            } else {
                document.getElementById('dynamic').textContent = "Waiting for worker to ingest data...";
            }
        } catch (err) {
            console.error('Fetch error:', err);
            document.getElementById('dynamic').textContent = "Error connecting to server.";
        }
    }

    // Update on load and then every 3 seconds
    window.onload = () => {
        updateData();
        setInterval(updateData, 3000);
    };
</script>
<body>
    <div class='container' id='container'>
        <h1>Welcome to this Super Sophisticated App</h1>
        <span>Some static data:  </span><h3 id="static">this is hard-coded in index.html</h3>
        <hr />
        <span>Data from MongoDB:  </span><h3 id="dynamic"></h3>
        <hr />
    </div>
</body>
</html>
